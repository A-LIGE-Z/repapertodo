name: repapertodo
description: Flutter-first reimplementation of PaperTodo for Windows and Android.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.18.0
  crypto: ^3.0.3
  http: ^1.2.2
  json_annotation: ^4.9.0
  path: ^1.9.0
  xml: ^6.5.0
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  json_serializable: ^6.8.0
  lints: ^4.0.0

flutter:
  uses-material-design: true
