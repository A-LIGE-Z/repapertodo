org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Keep the legacy Android DSL and external Kotlin plugin path until the Flutter
# Gradle plugin configures cleanly with AGP's built-in Kotlin support.
android.newDsl=false
android.builtInKotlin=false
# Puro keeps hosted plugins under the user profile, while this workspace may
# live on another drive. Kotlin incremental caches cannot relativize those
# cross-drive paths reliably during plugin compilation, so release builds use full
# non-incremental Kotlin compilation.
kotlin.incremental=false
