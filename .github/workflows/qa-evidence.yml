name: Collect Release QA Evidence

on:
  workflow_dispatch:
    inputs:
      candidateRunId:
        description: Package workflow run ID whose artifacts were manually tested.
        required: true
        type: string
      tester:
        description: Person who completed the Windows desktop QA checks.
        required: true
        type: string
      transparentBorderlessFeel:
        description: Transparent borderless paper feel passed.
        required: true
        default: fail
        type: choice
        options: [fail, pass]
      taskSwitcherVisibility:
        description: Alt+Tab and Task View visibility behavior passed.
        required: true
        default: fail
        type: choice
        options: [fail, pass]
      multiMonitorEdgeDocking:
        description: Multi-monitor edge docking behavior passed.
        required: true
        default: fail
        type: choice
        options: [fail, pass]
      fullscreenAvoidance:
        description: Fullscreen avoidance behavior passed.
        required: true
        default: fail
        type: choice
        options: [fail, pass]
      trayAfterExplorerRestart:
        description: Tray recovery after Explorer restart passed.
        required: true
        default: fail
        type: choice
        options: [fail, pass]
      longRunningScriptCapsule:
        description: Long-running script capsule behavior passed.
        required: true
        default: fail
        type: choice
        options: [fail, pass]
      independentPaperSurfaces:
        description: Multiple visible papers behaved as independent surfaces.
        required: true
        default: fail
        type: choice
        options: [fail, pass]
      deviceSerial:
        description: Optional adb serial when more than one device is connected.
        required: false
        default: ""
        type: string

concurrency:
  group: repapertodo-qa-evidence-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect:
    name: Collect build-bound QA evidence
    runs-on: [self-hosted, Windows, X64]
    permissions:
      actions: read
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Download packaged candidate
        uses: actions/download-artifact@v4
        with:
          pattern: repapertodo-*
          path: candidate
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.candidateRunId }}

      - name: Verify candidate and prepare QA paths
        id: candidate
        shell: pwsh
        run: |
          $metadataFiles = @(Get-ChildItem -LiteralPath candidate -Filter "repapertodo-*-release.json" -File)
          $windowsZips = @(Get-ChildItem -LiteralPath candidate -Filter "repapertodo-windows-x64-*.zip" -File)
          $androidApks = @(Get-ChildItem -LiteralPath candidate -Filter "repapertodo-android-*.apk" -File)
          if ($metadataFiles.Count -ne 1 -or $windowsZips.Count -ne 1 -or $androidApks.Count -ne 1) {
            throw "The candidate artifact must contain exactly one release metadata JSON, Windows zip, and Android APK."
          }
          $metadata = Get-Content -Raw -LiteralPath $metadataFiles[0].FullName | ConvertFrom-Json
          if ([string]$metadata.gitCommit -ne "${{ github.sha }}") {
            throw "Candidate gitCommit must match the checked-out commit."
          }
          $windowsDirectory = Join-Path $PWD "candidate\windows-release"
          New-Item -ItemType Directory -Force -Path $windowsDirectory | Out-Null
          Expand-Archive -LiteralPath $windowsZips[0].FullName -DestinationPath $windowsDirectory -Force
          $exeFiles = @(Get-ChildItem -LiteralPath $windowsDirectory -Recurse -Filter repapertodo.exe -File)
          if ($exeFiles.Count -ne 1) {
            throw "The Windows candidate must contain exactly one repapertodo.exe."
          }
          New-Item -ItemType Directory -Force -Path dist\qa | Out-Null
          "exePath=$($exeFiles[0].FullName)" >> $env:GITHUB_OUTPUT
          "apkPath=$($androidApks[0].FullName)" >> $env:GITHUB_OUTPUT

      - name: Resolve Dart packages
        shell: pwsh
        run: flutter pub get

      - name: Record Windows manual QA
        shell: pwsh
        run: |
          .\scripts\windows_manual_qa.ps1 `
            -TransparentBorderlessFeel "${{ inputs.transparentBorderlessFeel }}" `
            -TaskSwitcherVisibility "${{ inputs.taskSwitcherVisibility }}" `
            -MultiMonitorEdgeDocking "${{ inputs.multiMonitorEdgeDocking }}" `
            -FullscreenAvoidance "${{ inputs.fullscreenAvoidance }}" `
            -TrayAfterExplorerRestart "${{ inputs.trayAfterExplorerRestart }}" `
            -LongRunningScriptCapsule "${{ inputs.longRunningScriptCapsule }}" `
            -IndependentPaperSurfaces "${{ inputs.independentPaperSurfaces }}" `
            -Tester "${{ inputs.tester }}" `
            -ExePath "${{ steps.candidate.outputs.exePath }}" `
            -ResultJson dist\qa\windows-manual-qa.json

      - name: Run generic WebDAV live smoke
        shell: pwsh
        env:
          REPAPERTODO_WEBDAV_ENDPOINT: ${{ secrets.GENERIC_WEBDAV_ENDPOINT }}
          REPAPERTODO_WEBDAV_USERNAME: ${{ secrets.GENERIC_WEBDAV_USERNAME }}
          REPAPERTODO_WEBDAV_PASSWORD: ${{ secrets.GENERIC_WEBDAV_PASSWORD }}
          REPAPERTODO_WEBDAV_PASSPHRASE: ${{ secrets.GENERIC_WEBDAV_PASSPHRASE }}
          REPAPERTODO_WEBDAV_ROOT: repapertodo-release-qa
        run: .\scripts\webdav_live_smoke.ps1 -ResultJson dist\qa\webdav-live-smoke.json

      - name: Run Jianguoyun WebDAV live smoke
        shell: pwsh
        env:
          REPAPERTODO_WEBDAV_PROVIDER: jianguoyun
          REPAPERTODO_WEBDAV_ENDPOINT: ${{ secrets.JIANGUOYUN_WEBDAV_ENDPOINT }}
          REPAPERTODO_WEBDAV_USERNAME: ${{ secrets.JIANGUOYUN_WEBDAV_USERNAME }}
          REPAPERTODO_WEBDAV_PASSWORD: ${{ secrets.JIANGUOYUN_WEBDAV_PASSWORD }}
          REPAPERTODO_WEBDAV_PASSPHRASE: ${{ secrets.JIANGUOYUN_WEBDAV_PASSPHRASE }}
          REPAPERTODO_WEBDAV_ROOT: repapertodo-release-qa
        run: .\scripts\webdav_live_smoke.ps1 -ResultJson dist\qa\webdav-domestic-live-smoke.json

      - name: Run Android device smoke
        shell: pwsh
        run: |
          $arguments = @(
            "-ApkPath", "${{ steps.candidate.outputs.apkPath }}",
            "-ResultJson", "dist\qa\android-device-smoke.json"
          )
          if (-not [string]::IsNullOrWhiteSpace("${{ inputs.deviceSerial }}")) {
            $arguments += @("-DeviceSerial", "${{ inputs.deviceSerial }}")
          }
          & .\scripts\android_device_smoke.ps1 @arguments

      - name: Upload QA evidence
        uses: actions/upload-artifact@v4
        with:
          name: repapertodo-qa-evidence
          path: dist/qa/*.json
          if-no-files-found: error
